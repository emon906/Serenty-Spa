<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERENTY SPA</title>
    <!-- tailwind and daiysy ui -->
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://kit.fontawesome.com/2489740162.js" crossorigin="anonymous"></script>
    <!-- tailwind and daiysy ui -->
     <!-- google fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
     <!-- google fonts -->
      <!-- favicon -->
       <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
      <!-- favicon -->
      <style>
        .font-fraunces {
            font-family: "Fraunces", serif;
        }
        .font-Roboto {
          font-family: "Roboto", sans-serif;
        }
        .font-Inter {
           font-family: "Inter", sans-serif;
        }
      </style>
</head>
<body>
   <!-- header -->
<header
  class="relative overflow-hidden"
  style="background-image: url('./img/header img.webp'); background-position: center; background-size: cover; background-repeat: no-repeat;"
>
  <!-- dark overlay -->
  <div class="absolute inset-0 bg-black/60"></div>

  <!-- navbar -->
  <div class="navbar relative z-10">
    <div class="navbar-start">
      <div class="dropdown">
        <div tabindex="0" role="button" class="btn btn-ghost text-white lg:hidden">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h8m-8 6h16"
            />
          </svg>
        </div>

        <ul
          tabindex="0"
          class="menu menu-sm dropdown-content rounded-box z-[20] mt-3 w-52 bg-black/80 p-2"
        >
          <li><a class="font-fraunces text-[18px] font-normal text-white">Home</a></li>
          <li><a class="font-fraunces text-[18px] font-normal text-white">Services</a></li>
          <li><a class="font-fraunces text-[18px] font-normal text-white">About</a></li>
          <li><a class="font-fraunces text-[18px] font-normal text-white">Contact</a></li>
        </ul>
      </div>

      <a>
        <img src="img/logo.png" alt="Serenity Spa" />
      </a>
    </div>

    <div class="navbar-center hidden lg:flex">
      <ul class="menu menu-horizontal px-1">
        <li><a class="font-fraunces text-[18px] font-normal text-white">Home</a></li>
        <li><a class="font-fraunces text-[18px] font-normal text-white">Services</a></li>
        <li><a class="font-fraunces text-[18px] font-normal text-white">About</a></li>
        <li><a class="font-fraunces text-[18px] font-normal text-white">Contact</a></li>
      </ul>
    </div>

    <div class="navbar-end">
      <button
  class="relative overflow-hidden bg-white px-6 py-2 text-[14px] font-normal rounded-lg text-[#7E1D1C] font-Roboto group transition-all duration-300">
  
  <span
    class="absolute inset-0 bg-[#6E0000] -translate-x-full group-hover:translate-x-0 transition-transform duration-500 ease-out">
  </span>

  <span class="relative z-10 group-hover:text-white transition-colors duration-500">
    Get Started
  </span>
    </div>
  </div>
  <!-- navbar -->
  <!-- hero -->
  <section class="relative z-10">
    <div class="flex min-h-[662px] items-center justify-center px-5 py-20 text-center text-white">
      <div>
        <!-- shudhu ei icon ta ghurbe -->
        <div class="mx-auto mb-5 grid h-14 w-14 place-items-center">
          <svg
            class="h-12 w-12 animate-spin text-white [animation-duration:8s]"
            viewBox="0 0 64 64"
            fill="none"
          >
            <circle cx="32" cy="12" r="9" stroke="currentColor" stroke-width="4" />
            <circle cx="32" cy="52" r="9" stroke="currentColor" stroke-width="4" />
            <circle cx="12" cy="32" r="9" stroke="currentColor" stroke-width="4" />
            <circle cx="52" cy="32" r="9" stroke="currentColor" stroke-width="4" />
            <circle cx="18" cy="18" r="8" stroke="currentColor" stroke-width="4" />
            <circle cx="46" cy="18" r="8" stroke="currentColor" stroke-width="4" />
            <circle cx="18" cy="46" r="8" stroke="currentColor" stroke-width="4" />
            <circle cx="46" cy="46" r="8" stroke="currentColor" stroke-width="4" />
            <circle cx="32" cy="32" r="7" fill="currentColor" />
          </svg>
        </div>

        <h1 class="font-fraunces text-[40px] font-normal leading-tight sm:text-[56px]">
          Escape to Pure Tranquility
        </h1>

        <p class="mx-auto mt-6 max-w-[720px] text-[16px] font-normal leading-7 font-Inter sm:text-[20px]">
          Discover ultimate relaxation at Serenity Spa - where ancient wellness meets modern luxury. Book your transformative experience in seconds.
        </p>

       <button
  class="relative mt-6 overflow-hidden bg-white px-6 py-2 text-[14px] font-normal rounded-lg text-[#7E1D1C] font-Roboto group transition-all duration-300">
  
  <span
    class="absolute inset-0 bg-[#6E0000] -translate-x-full group-hover:translate-x-0 transition-transform duration-500 ease-out">
  </span>

  <span class="relative z-10 group-hover:text-white transition-colors duration-500">
    Book Your Escape Now
  </span>
      </div>
    </div>
  </section>
  <!-- hero -->
</header>
<!-- header -->
</body>
</html>
